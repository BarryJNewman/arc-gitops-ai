apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: akv-code-server
  namespace: code-server
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    keyvaultName: arc-onboard-kv
    tenantId: 1af9ebd3-3f5b-407b-824c-973cc3334dca
    objects: |
      array:
        - |
          objectName: code-server-password
          objectType: secret
  secretObjects:
    - secretName: code-server-secrets
      type: Opaque
      data:
        - objectName: code-server-password
          key: PASSWORD
