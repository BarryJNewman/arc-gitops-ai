apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-web
  namespace: dify
  labels:
    app: dify-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dify-web
  template:
    metadata:
      labels:
        app: dify-web
    spec:
      containers:
        - name: web
          image: langgenius/dify-web:1.13.0
          env:
            - name: CONSOLE_API_URL
              value: "https://dify.darkoverlay.com"
            - name: APP_API_URL
              value: "https://dify.darkoverlay.com"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
