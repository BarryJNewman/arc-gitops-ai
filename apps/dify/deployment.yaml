apiVersion: apps/v1
kind: Deployment
metadata:
  name: dify-api
  namespace: dify
  labels:
    app: dify-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dify-api
  template:
    metadata:
      labels:
        app: dify-api
    spec:
      initContainers:
        - name: fix-storage-perms
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1001:1001 /storage"]
          volumeMounts:
            - name: storage
              mountPath: /storage
      containers:
        - name: api
          image: langgenius/dify-api:1.13.0
          envFrom:
            - configMapRef:
                name: dify-config
          env:
            - name: MODE
              value: "api"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: DB_PASSWORD
            - name: PGVECTOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dify-secrets
                  key: DB_PASSWORD
          ports:
            - containerPort: 5001
          volumeMounts:
            - name: storage
              mountPath: /app/api/storage
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: storage
          hostPath:
            path: /var/lib/dify/storage
            type: DirectoryOrCreate
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: akv-dify
            nodePublishSecretRef:
              name: secrets-store-creds
---
