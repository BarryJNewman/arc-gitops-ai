---
# Security Onion 2.4 — Network Security Monitoring + Onion AI
#
# Security Onion is deployed as a KubeVirt VM with:
#   - 16GB RAM, 4 vCPUs (minimum for standalone eval mode)
#   - 200GB data disk (Elasticsearch, Suricata, Zeek logs)
#   - Management interface via masquerade networking
#   - SOC web UI exposed via NodePort + Ingress
#
# ISO Upload:
#   The Security Onion ISO must be uploaded to the cluster before the VM
#   can boot. Use virtctl or CDI upload proxy:
#
#   virtctl image-upload dv securityonion-iso \
#     --namespace kubevirt-vms \
#     --size 16Gi \
#     --image-path /path/to/securityonion-2.4.210-20260302.iso \
#     --uploadproxy-url https://$(kubectl get svc -n cdi cdi-uploadproxy -o jsonpath='{.spec.clusterIP}'):443 \
#     --insecure
#
# Onion AI Configuration:
#   After install, configure SOC to use the local LiteLLM proxy:
#   Administration → Configuration → soc → config → server → modules → assistant → adapters
#     Name: local-ollama
#     Protocol: openai_chat
#     API Url: http://litellm.litellm.svc.cluster.local:4000/v1/
#     API Key: sk-litellm-master-key
#   Then add models under: soc → config → server → client → assistant → availableModels
#     Name: qwen3-32b
#     Adapter: local-ollama
#     Model: qwen3:32b

# DataVolume: Empty disk for Security Onion installation
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: securityonion-disk
  namespace: kubevirt-vms
spec:
  source:
    blank: {}
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 200Gi
---
# DataVolume: Security Onion ISO — uploaded via virtctl or CDI upload proxy
# This DataVolume uses a blank source as a placeholder.
# After applying, upload the ISO with:
#   virtctl image-upload dv securityonion-iso -n kubevirt-vms \
#     --size 16Gi --image-path ./securityonion-2.4.210-20260302.iso --insecure
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: securityonion-iso
  namespace: kubevirt-vms
  annotations:
    cdi.kubevirt.io/storage.bind.immediate.requested: "true"
spec:
  source:
    upload: {}
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 16Gi
---
# VirtualMachine: Security Onion 2.4 — Standalone Eval Mode
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: securityonion
  namespace: kubevirt-vms
  labels:
    app: securityonion
spec:
  running: false
  template:
    metadata:
      labels:
        app: securityonion
        kubevirt.io/domain: securityonion
    spec:
      domain:
        cpu:
          cores: 4
          sockets: 1
          threads: 1
        memory:
          guest: 16Gi
        machine:
          type: q35
        clock:
          utc: {}
        features:
          acpi: {}
          apic: {}
        devices:
          disks:
            - name: securityonion-disk
              disk:
                bus: virtio
              bootOrder: 1
            - name: securityonion-iso
              cdrom:
                bus: sata
              bootOrder: 2
          interfaces:
            - name: default
              masquerade: {}
          networkInterfaceMultiqueue: true
      networks:
        - name: default
          pod: {}
      volumes:
        - name: securityonion-disk
          dataVolume:
            name: securityonion-disk
        - name: securityonion-iso
          dataVolume:
            name: securityonion-iso
      terminationGracePeriodSeconds: 120
---
# Service: SOC Web UI (HTTPS on port 443)
apiVersion: v1
kind: Service
metadata:
  name: securityonion-web
  namespace: kubevirt-vms
spec:
  type: NodePort
  selector:
    kubevirt.io/domain: securityonion
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
---
# Service: SSH access
apiVersion: v1
kind: Service
metadata:
  name: securityonion-ssh
  namespace: kubevirt-vms
spec:
  type: NodePort
  selector:
    kubevirt.io/domain: securityonion
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      protocol: TCP
