---
# Job to install KubeVirt operator and CDI operator from upstream releases.
# These are ~6000-line manifests that change between versions, so we apply
# them via kubectl rather than vendoring into GitOps.
# Re-running is idempotent (kubectl apply).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubevirt-installer
  namespace: kubevirt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubevirt-installer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kubevirt-installer
    namespace: kubevirt
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kubevirt-install-v1-7-1c
  namespace: kubevirt
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: kubevirt-installer
      restartPolicy: OnFailure
      containers:
        - name: install
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              KUBEVIRT_VERSION="v1.7.1"
              CDI_VERSION="v1.62.0"
              PROM_OPERATOR_VERSION="v0.75.0"

              echo "=== Installing ServiceMonitor CRD (monitoring.coreos.com) ==="
              # Required before virt-operator starts. Azure Monitor installs
              # servicemonitors.azmonitoring.coreos.com which triggers virt-operator's
              # ServiceMonitor detection on every CRD informer sync, causing a
              # reinit loop (exit 0). Installing the real monitoring.coreos.com CRD
              # makes IsServiceMonitorEnabled() return true consistently at startup
              # so the state never changes and virt-operator stays running.
              kubectl apply -f "https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/$${PROM_OPERATOR_VERSION}/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml"

              echo "=== Installing KubeVirt operator $${KUBEVIRT_VERSION} ==="
              kubectl apply -f "https://github.com/kubevirt/kubevirt/releases/download/$${KUBEVIRT_VERSION}/kubevirt-operator.yaml"

              echo "=== Creating KubeVirt CR ==="
              kubectl apply -f "https://github.com/kubevirt/kubevirt/releases/download/$${KUBEVIRT_VERSION}/kubevirt-cr.yaml"

              echo "=== Installing CDI operator $${CDI_VERSION} ==="
              kubectl apply -f "https://github.com/kubevirt/containerized-data-importer/releases/download/$${CDI_VERSION}/cdi-operator.yaml"

              echo "=== Creating CDI CR ==="
              kubectl apply -f "https://github.com/kubevirt/containerized-data-importer/releases/download/$${CDI_VERSION}/cdi-cr.yaml"

              echo "=== Waiting for KubeVirt to be ready ==="
              kubectl wait --for=condition=Available kubevirt/kubevirt -n kubevirt --timeout=300s || echo "WARNING: KubeVirt not ready yet (will converge)"

              echo "=== Done ==="
