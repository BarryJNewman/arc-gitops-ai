---
# kubevirt-manager — Web UI + noVNC console for KubeVirt
# Source: https://github.com/kubevirt-manager/kubevirt-manager
# The bundled.yaml is too large to vendor, so we install via Job
# similar to the KubeVirt operator itself.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubevirt-manager-installer
  namespace: kubevirt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubevirt-manager-installer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kubevirt-manager-installer
    namespace: kubevirt
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kubevirt-manager-install
  namespace: kubevirt
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: kubevirt-manager-installer
      restartPolicy: OnFailure
      containers:
        - name: install
          image: alpine/k8s:1.31.4
          command:
            - /bin/sh
            - -c
            - |
              set -e
              KBMGR_VERSION="v1.5.4"
              echo "=== Installing kubevirt-manager $${KBMGR_VERSION} ==="
              kubectl apply -f "https://raw.githubusercontent.com/kubevirt-manager/kubevirt-manager/$${KBMGR_VERSION}/kubernetes/bundled.yaml"

              echo "=== Pinning image to $${KBMGR_VERSION} ==="
              kubectl set image deploy/kubevirt-manager -n kubevirt-manager \
                kubevirtmgr=kubevirtmanager/kubevirt-manager:1.5.4

              echo "=== Patching service to NodePort ==="
              kubectl patch svc kubevirt-manager -n kubevirt-manager \
                -p '{"spec":{"type":"NodePort"}}'

              echo "=== Done ==="
