apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # ── Chat models ────────────────────────────────────────────
      # Cloud primary — OpenAI GPT-5.4
      - model_name: gpt-5.4
        litellm_params:
          model: openai/gpt-5.4

      # Cloud secondary — OpenAI GPT-5.1 Codex
      - model_name: gpt-5.1-codex
        litellm_params:
          model: openai/gpt-5.1-codex

      # Local fallback — Ollama auto-selected model via stable alias
      # The "local-chat" alias is created by the Ollama init container
      # pointing to whatever model llmfit recommended for this hardware.
      - model_name: local-chat
        litellm_params:
          model: ollama/local-chat
          api_base: http://ollama.ollama.svc.cluster.local:11434
          stream: true

      # Local code model — same alias, separate routing name
      - model_name: local-code
        litellm_params:
          model: ollama/local-code
          api_base: http://ollama.ollama.svc.cluster.local:11434
          stream: true

      # ── Embedding model ────────────────────────────────────────
      - model_name: text-embedding-nomic
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://ollama.ollama.svc.cluster.local:11434

    router_settings:
      routing_strategy: "simple-shuffle"
      num_retries: 2
      timeout: 30
      fallbacks:
        - gpt-5.4: [gpt-5.1-codex, local-chat]
        - gpt-5.1-codex: [local-chat]

    litellm_settings:
      drop_params: true
      set_verbose: false
      request_timeout: 300

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
