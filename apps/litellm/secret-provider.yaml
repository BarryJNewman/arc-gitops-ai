apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: akv-litellm
  namespace: litellm
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    keyvaultName: arc-onboard-kv
    cloudName: AzureUSGovernmentCloud
    tenantId: 80c5c29b-f6c2-457b-af54-603a8d840878
    objects: |
      array:
        - |
          objectName: litellm-master-key
          objectType: secret
        - |
          objectName: openai-api-key
          objectType: secret
        - |
          objectName: pgvector-password
          objectType: secret
  secretObjects:
    - secretName: litellm-secrets
      type: Opaque
      data:
        - objectName: litellm-master-key
          key: LITELLM_MASTER_KEY
        - objectName: openai-api-key
          key: OPENAI_API_KEY
        - objectName: pgvector-password
          key: PGVECTOR_PASSWORD
