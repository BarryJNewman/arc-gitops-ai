apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: akv-neo4j
  namespace: neo4j
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    keyvaultName: arc-onboard-kv
    tenantId: 1af9ebd3-3f5b-407b-824c-973cc3334dca
    objects: |
      array:
        - |
          objectName: neo4j-password
          objectType: secret
  secretObjects:
    - secretName: neo4j-secrets
      type: Opaque
      data:
        - objectName: neo4j-password
          key: NEO4J_AUTH_PASSWORD
