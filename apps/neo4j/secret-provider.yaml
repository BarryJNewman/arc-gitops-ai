apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: akv-neo4j
  namespace: neo4j
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    keyvaultName: arc-onboard-kv
    cloudName: AzureUSGovernmentCloud
    tenantId: 80c5c29b-f6c2-457b-af54-603a8d840878
    objects: |
      array:
        - |
          objectName: neo4j-password
          objectType: secret
  secretObjects:
    - secretName: neo4j-secrets
      type: Opaque
      data:
        - objectName: neo4j-password
          key: NEO4J_AUTH_PASSWORD
