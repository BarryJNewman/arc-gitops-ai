apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: akv-neo4j
  namespace: neo4j
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    keyvaultName: ${ARC_KEYVAULT_NAME}
    cloudName: "${ARC_CSI_CLOUD_NAME}"
    tenantId: ${ARC_TENANT_ID}
    objects: |
      array:
        - |
          objectName: neo4j-password
          objectType: secret
  secretObjects:
    - secretName: neo4j-secrets
      type: Opaque
      data:
        - objectName: neo4j-password
          key: NEO4J_AUTH_PASSWORD
