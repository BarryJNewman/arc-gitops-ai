apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            # Point at LiteLLM proxy as the OpenAI-compatible backend
            - name: OPENAI_API_BASE_URL
              value: "http://litellm.litellm.svc.cluster.local:4000/v1"
            - name: OPENAI_API_KEY
              value: "sk-litellm-master-key"
            # Disable Ollama direct connection — everything goes through LiteLLM
            - name: OLLAMA_BASE_URL
              value: ""
            - name: ENABLE_OLLAMA_API
              value: "false"
            # Disable signup after first user
            - name: ENABLE_SIGNUP
              value: "true"
            - name: WEBUI_AUTH
              value: "true"
            - name: WEBUI_NAME
              value: "Open WebUI"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
